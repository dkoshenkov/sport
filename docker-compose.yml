services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sport
      POSTGRES_USER: sport
      POSTGRES_PASSWORD: sport
    ports:
      - "${POSTGRES_PORT:-35432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sport -d sport"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: api
    environment:
      ENV: dev
      SERVICE_NAME: sport-api
      SPORT_API_ADDR: :8080
      SPORT_MAIN_DOMAIN: ${SPORT_MAIN_DOMAIN:-example.com}
      EXERCISE_MEDIA_BASE_URL: ${EXERCISE_MEDIA_BASE_URL:-http://localhost:${CLIENT_PORT:-38174}}
      EXERCISE_MEDIA_MANIFEST: ${EXERCISE_MEDIA_MANIFEST:-}
      DATABASE_URL: postgres://sport:sport@postgres:5432/sport?sslmode=disable
      DATABASE_RUN_MIGRATIONS: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      HTTP_REQUEST_ID_HEADER: X-Request-ID
      HTTP_TIMEOUT: 30s
      HTTP_LOG_REQUESTS: "true"
    ports:
      - "${API_PORT:-38080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT:-38174}:80"
    depends_on:
      - api

  media-sync:
    profiles: ["tools"]
    build:
      context: ./server
      dockerfile: Dockerfile
      target: media-sync
    environment:
      ENV: dev
      SERVICE_NAME: sport-media-sync
      SPORT_MAIN_DOMAIN: ${SPORT_MAIN_DOMAIN:-example.com}
      EXERCISE_DATASET_DIR: ${EXERCISE_DATASET_DIR:-/dataset}
      EXERCISE_MEDIA_BASE_URL: ${EXERCISE_MEDIA_BASE_URL-}
      EXERCISE_MEDIA_SOURCE_DIR: ${EXERCISE_MEDIA_SOURCE_DIR:-/gifs}
      EXERCISE_MEDIA_SOURCE_BASE_URL: ${EXERCISE_MEDIA_SOURCE_BASE_URL:-}
      EXERCISE_MEDIA_STORAGE_MODE: ${EXERCISE_MEDIA_STORAGE_MODE:-local}
      EXERCISE_MEDIA_LOCAL_DIR: /media/exercises
      EXERCISE_MEDIA_MANIFEST: /media/exercises/exercise-media.json
      DATABASE_URL: postgres://sport:sport@postgres:5432/sport?sslmode=disable
      DATABASE_RUN_MIGRATIONS: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      S3_PREFIX: ${S3_PREFIX:-exercises}
    volumes:
      - ./exercises-dataset:/dataset:ro
      - ./exercises-gifs:/gifs:ro
      - ./client/public/exercises:/media/exercises
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
