services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sport
      POSTGRES_USER: sport
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - sport-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sport -d sport"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      ENV: prod
      SERVICE_NAME: sport-api
      SPORT_API_ADDR: :8080
      SPORT_MAIN_DOMAIN: sport.register.im
      DATABASE_URL: postgres://sport:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sport?sslmode=disable
      DATABASE_RUN_MIGRATIONS: "true"
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      HTTP_REQUEST_ID_HEADER: X-Request-ID
      HTTP_TIMEOUT: 30s
      HTTP_LOG_REQUESTS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ../
      dockerfile: deploy/docker/client.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    volumes:
      - ../exercises-gifs/assets:/usr/share/nginx/html/exercises:ro
    depends_on:
      - api

  media-sync:
    profiles: ["tools"]
    build:
      context: ../
      dockerfile: deploy/docker/media-sync.Dockerfile
    environment:
      ENV: prod
      SERVICE_NAME: sport-media-sync
      SPORT_MAIN_DOMAIN: sport.register.im
      DATABASE_URL: postgres://sport:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/sport?sslmode=disable
      DATABASE_RUN_MIGRATIONS: "true"
      EXERCISE_DATASET_DIR: /dataset
      EXERCISE_MEDIA_BASE_URL: ""
      EXERCISE_MEDIA_SOURCE_DIR: /gifs
      EXERCISE_MEDIA_STORAGE_MODE: local
      EXERCISE_MEDIA_LOCAL_DIR: /tmp/exercises
      EXERCISE_MEDIA_MANIFEST: /tmp/exercise-media.json
      LOG_LEVEL: info
      LOG_PRETTY: "false"
    volumes:
      - ../exercises-dataset:/dataset:ro
      - ../exercises-gifs:/gifs:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sport-postgres-data:
